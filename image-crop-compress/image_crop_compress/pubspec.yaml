name: image_crop_compress
description: >
  A modern, responsive image editing toolkit for Flutter. Crop, compress,
  resize, convert, and more — with native performance, beautiful adaptive UI,
  and support for phones, tablets, foldables, and desktop.
version: 0.0.1
homepage: https://github.com/yourorg/image_crop_compress
repository: https://github.com/yourorg/image_crop_compress
issue_tracker: https://github.com/yourorg/image_crop_compress/issues
topics:
  - image
  - crop
  - compress
  - image-processing
  - image-editor

environment:
  sdk: ^3.12.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_crop_compress_core: ^0.0.1
  image_crop_compress_ui: ^0.0.1
  # Platform implementations are endorsed (auto-included)
  image_crop_compress_android: ^0.0.1
  image_crop_compress_ios: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: image_crop_compress_android
      ios:
        default_package: image_crop_compress_ios
