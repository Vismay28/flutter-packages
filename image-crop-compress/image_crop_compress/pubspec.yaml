name: image_crop_compress
description: >
  A high-performance Flutter image toolkit. Crop, compress, resize, and convert
  with native APIs and a beautiful adaptive UI.
version: 0.0.3
homepage: https://github.com/Vismay28/flutter-packages/tree/main/image-crop-compress
repository: https://github.com/Vismay28/flutter-packages/tree/main/image-crop-compress
issue_tracker: https://github.com/Vismay28/flutter-packages/issues
topics:
  - image
  - crop
  - compress
  - image-processing
  - image-editor

environment:
  sdk: ^3.12.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_crop_compress_core: ^0.0.3
  image_crop_compress_ui: ^0.0.3
  # Platform implementations are endorsed (auto-included)
  image_crop_compress_android: ^0.0.3
  image_crop_compress_ios: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: image_crop_compress_android
      ios:
        default_package: image_crop_compress_ios
