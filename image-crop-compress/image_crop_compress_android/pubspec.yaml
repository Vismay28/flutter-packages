name: image_crop_compress_android
description: >
  Android implementation of image_crop_compress. Provides native image
  processing using Android Bitmap, Canvas, and Matrix APIs.
version: 0.0.3
homepage: https://github.com/Vismay28/flutter-packages/tree/main/image-crop-compress
repository: https://github.com/Vismay28/flutter-packages/tree/main/image-crop-compress
issue_tracker: https://github.com/Vismay28/flutter-packages/issues

environment:
  sdk: ^3.12.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_crop_compress_core: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: image_crop_compress
    platforms:
      android:
        package: com.imageprocessor.image_crop_compress_android
        pluginClass: ImageCropCompressAndroidPlugin
