name: image_crop_compress_ios
description: >
  iOS implementation of image_crop_compress. Provides native image
  processing using CoreImage, UIKit, and ImageIO frameworks.
version: 0.0.1
homepage: https://github.com/yourorg/image_crop_compress

environment:
  sdk: ^3.12.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_crop_compress_core: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: image_crop_compress
    platforms:
      ios:
        pluginClass: ImageCropCompressIosPlugin
