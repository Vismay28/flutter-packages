name: image_crop_compress_core
description: >
  Core library for image_crop_compress. Contains models, pipeline engine,
  platform interface, and operation definitions. This is a pure Dart package
  with no Flutter widget dependencies.
version: 0.0.1
publish_to: none # Internal package — not published separately

environment:
  sdk: ^3.12.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
