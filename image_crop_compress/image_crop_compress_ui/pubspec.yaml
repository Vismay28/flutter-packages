name: image_crop_compress_ui
description: >
  Responsive image editor UI for image_crop_compress. Contains the
  adaptive editor shell, layout delegates, widgets, toolbar, and theming
  system. Designed for phones, tablets, foldables, and desktop.
version: 0.0.1
publish_to: none # Internal package — not published separately

environment:
  sdk: ^3.12.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_crop_compress_core:
    path: ../image_crop_compress_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
